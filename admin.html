<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<body>
  <div class="bg-grid"></div>
  <header class="site-header"><a class="brand" href="index.html"><span class="brand-mark">S</span><span>StreamStock</span></a><nav class="desktop-nav"><a href="index.html">Market</a><a href="portfolio.html">Portfolio</a><a href="profile.html">Profile</a><a href="admin.html">Add Ticker</a></nav><button class="ghost-btn" id="resetDemoBtn" type="button">Reset demo</button></header>
  <main>
    <section class="page-hero skinny"><div><p class="eyebrow">Manual ticker manager</p><h1>Add a streamer</h1><p class="muted big-muted">This saves to browser storage for the demo. Later this becomes a real admin dashboard/database.</p></div></section>
    <section class="panel full admin-panel"><form id="tickerForm" class="admin-grid"><label>Streamer Name<input id="newName" required placeholder="Example: Ninja" /></label><label>Ticker<input id="newTicker" required maxlength="6" placeholder="NINJA" /></label><label>Subscribers<input id="newSubs" required type="number" min="0" step="1" placeholder="100000" /></label><label>Day Change %<input id="newChange" required type="number" step="0.01" placeholder="4.20" /></label><button class="primary-btn" type="submit">Add Ticker</button></form></section>
  </main>
  <footer><strong>StreamStock</strong><span>Fantasy investing only. Not affiliated with Twitch.</span></footer>
  <script src="app.js"></script>
</body>
